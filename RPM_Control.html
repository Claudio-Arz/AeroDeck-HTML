<!-- 
 RPM control slider and buttons
  Este código HTML define el control para el instrumento RPM, 
  que incluye un slider vertical para ajustar las revoluciones por minuto 
  y tres botones para establecer valores predefinidos (máximo, medio y mínimo).

  Definir una caja de contención como en gyro.

  +----------------------------------+
  |           RPM Control            |
  +------------+----+----------------+
  |            |    |                |   
  |      s     | (+)|     Máximo     |   
  |      l     +----+----------------+
  |      i     |    |                |   
  |      d     |    |     Medio      |   
  |      e     +----+----------------+   
  |      r     |    |                |   
  |            | (-)|     Mínimo     |   
  +------------+----+----+-----------+   
  |    value   |  Start  | Noice     |   
  +------------+---------+-----------+

-->

<!-- Control deslizante para motor y botones Start y Noice -->

<!-- Contenedor RPM + Brake -->
<div class="rpm-control-wrapper">

  <!-- Caja contenedora 120px x 240px -->
  <div class="rpm-control-box">
  
  <!-- Título RPM Control -->
  <div style="text-align: center; font-weight: bold; padding: 4px 0; border-bottom: 1px solid #555;">RPM Control</div>
  
  <!-- Zona central: slider | +/- | Max/Med/Min -->
  <div style="flex: 1; display: flex; flex-direction: row;">
    
    <!-- Columna slider -->
    <div style="width: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center;">
      <input type="range" min="0" max="3000" value="0" id="rpm-slider" style="height: 120px; writing-mode: vertical-lr; direction: rtl">
    </div>
    
    <!-- Columna +/- -->
    <div style="width: 30px; display: flex; flex-direction: column; justify-content: space-around; align-items: center;">
      <button id="rpm-btn-plus" class="slider-glow-btn slider-btn slider-btn-max" style="width: 24px; height: 24px; font-size: 14px; color: #f7e30a;">+</button>
      <button id="rpm-btn-minus" class="slider-glow-btn slider-btn slider-btn-min" style="width: 24px; height: 24px; font-size: 14px; color: #f7e30a;">-</button>
    </div>
    
    <!-- Columna Max/Med/Min -->
    <div style="flex: 1; display: flex; flex-direction: column; justify-content: space-around; align-items: center; padding: 4px;">
      <button id="rpm-slider-max" class="slider-glow-btn slider-btn slider-btn-max" style="width: 100%; height: 28px; font-size: 10px; color: #fff;">Máximo</button>
      <button id="rpm-slider-mid" class="slider-glow-btn slider-btn slider-btn-mid" style="width: 100%; height: 28px; font-size: 10px; color: #fff;">Medio</button>
      <button id="rpm-slider-min" class="slider-glow-btn slider-btn slider-btn-min" style="width: 100%; height: 28px; font-size: 10px; color: #fff;">Mínimo</button>
    </div>
    
  </div>
  
  <!-- Zona inferior: value | Start | Noice | SIM -->
  <div style="display: flex; flex-direction: row; border-top: 1px solid #555; height: 50px;">
    <div style="width: 30px; display: flex; align-items: center; justify-content: center; font-size: 10px;">
      <span id="rpm-slider-value">0</span>
    </div>
    <button id="start-btn-rpm" style="flex: 1; font-size: 10px; border-radius: 4px; margin: 2px;">Start</button>
    <button id="noice-btn-rpm" style="flex: 1; font-size: 10px; background: #444; color: #fff; border-radius: 4px; border: none; cursor: pointer; margin: 2px;">Noice</button>
    <button id="sim-btn-rpm" style="flex: 1; font-size: 10px; background: #444; color: #fff; border-radius: 4px; border: none; cursor: pointer; margin: 2px;">SIM</button>
  </div>
  
  </div>

  <!-- Boton Brake 70px x 240px -->
  <button id="rpm-brake-btn" class="rpm-brake-btn" type="button">
    <span id="rpm-brake-label" class="rpm-brake-label">BRAKE OFF</span>
  </button>

</div>

<style>
  .rpm-control-wrapper {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 6px;
  }

  .rpm-control-box {
    width: 120px;
    height: 240px;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
    background-color: rgb(63, 155, 158);
  }

  .rpm-brake-btn {
    width: 70px;
    height: 240px;
    border: 2px solid #333;
    background: #d9d9d9;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }

  .rpm-brake-label {
    display: inline-block;
    transform: rotate(90deg);
    font-weight: bold;
    font-size: 14px;
    color: #1e4fbf;
    letter-spacing: 1px;
  }

  .rpm-brake-btn.is-on .rpm-brake-label {
    color: #c00000;
  }
</style>
