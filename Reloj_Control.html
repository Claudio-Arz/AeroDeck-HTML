<!-- 

Watch Control 
Medidas: 120px x 240px

                +---------------------+
                |  Watch Control      |
                +---------------------+
                |                     |
                |  Clock/Chronograph  |   
                |                     |
                +---------------------+
                |                     |
                |     Start/Stop      |
                |                     |
                +---------------------+
                |                     |
                |          Reset      |
                |                     |
                +---------------------+

                Quisiera un control para el reloj. 
                    Tres botones. 
                        Boton superior va a 
                        mostrar "Cronograph" cuando esté funcionando como Reloj, y va a decir 
                        "Clock" cuando esté funcionando el Chronograph. Cuando se conecta el 
                        chronograph las agujas de hora, minutos, y segundero hace un giro en 
                        sentido horario, hasta llegar a las 12.

                        El botón del medio es el Start/Stop. Cuando se presiona, el reloj
                        comienza a funcionar como un cronómetro, y el botón del medio cambia 
                        a "Stop". Al presionar "Stop", el cronómetro se detiene, y el botón 
                        vuelve a decir "Start". Las agujas de minutos y horas se convierten 
                        en contadores de minutos y horas del cronómetro, mientras que el
                        segundero sigue funcionando en modo cronómetro.

                        El botón inferior es el Reset. Cuando se presiona, el cronómetro se
                        reinicia a cero, y las agujas vuelven a la posición de las 12
                        independientemente de si el cronómetro está en marcha o detenido.


                

-->

<div class="watch-control-container">
  <!-- Título -->
  <div class="title-watch-control">⌚ Watch Control</div>
  
  <!-- Área de botones -->
  <div class="watch-buttons-area">
    
    <!-- Botón Mode: Clock/Chronograph -->
    <button class="watch-btn watch-mode-btn" id="watch-mode-btn">
      <span class="watch-btn-icon">🔄</span>
      <span class="watch-btn-text" id="watch-mode-text">Chronograph</span>
    </button>
    
    <!-- Botón Zone (solo visible en modo Clock) -->
    <button class="watch-btn watch-zone-btn" id="watch-zone-btn">
      <span class="watch-btn-icon">🌍</span>
      <span class="watch-btn-text">Zone</span>
    </button>
    
    <!-- Botón Start/Stop -->
    <button class="watch-btn watch-startstop-btn" id="watch-startstop-btn">
      <span class="watch-btn-icon">▶</span>
      <span class="watch-btn-text" id="watch-startstop-text">Start</span>
    </button>
    
    <!-- Botón Reset -->
    <button class="watch-btn watch-reset-btn" id="watch-reset-btn">
      <span class="watch-btn-icon">⟲</span>
      <span class="watch-btn-text">Reset</span>
    </button>
    
  </div>
  
  <!-- Display de tiempo -->
  <div class="watch-display" id="watch-display">00:00:00</div>
  
  <!-- Lista de zonas horarias (oculta por defecto) -->
  <div class="zone-list-overlay" id="zone-list-overlay">
    <div class="zone-list-container" id="zone-list-container">
      <div class="zone-list-title">Select Time Zone</div>
      <div class="zone-list-scroll" id="zone-list-scroll"></div>
      <button class="zone-close-btn" id="zone-close-btn">✕ Close</button>
    </div>
  </div>
</div>
