<!-- 

Este código HTML representa un control deslizante para ajustar el EGT (Exhaust Gas Temperature) 
en un instrumento de simulación de vuelo. El control incluye un slider vertical que permite al 
usuario seleccionar un valor de temperatura entre 100 y 500 grados, y tres botones para establecer 
valores predefinidos (mínimo, medio y máximo). El valor seleccionado se muestra en una etiqueta 
debajo del slider, y se envía al ESP32 para actualizar el instrumento de EGT en tiempo real. 


EGT Control  (medidas 120px x 240px)


                +------------------------+
                |      EGT Control       |
                +-------+-----+----------+
                |       |     |          |   
                |   s   | (+) |  Máximo  |   
                |   l   +-----+----------+
                |   i   |     |          |   
                |   d   |     |  Medio   |   
                |   e   +-----+----------+   
                |   r   |     |          |   
                |       | (-) |  Mínimo  |   
                +-------+----------------+   
                | value |                |   
                +-------+----------------+

-->

<div class="egt-control-container">
  <!-- Título -->
  <div class="title-egt-control">Mixture Control</div>
  <!-- Fila principal: Slider + Botones -->
  <div class="egt-main-row">
    <!-- Slider vertical -->
    <div class="egt-slider-column">
      <input type="range" min="0" max="100" value="45" id="egt-slider" orient="vertical" class="egt-slider-input">
    </div>
    <!-- Botones +1/-1 -->
    <div class="egt-plusminus-column">
      <button id="egt-btn-plus" class="egt-btn egt-btn-plus">+</button>
      <button id="egt-btn-minus" class="egt-btn egt-btn-minus">−</button>
    </div>
    <!-- Botones Máx/Med/Mín -->
    <div class="egt-presets-column">
      <button id="egt-slider-max" class="egt-btn egt-btn-preset egt-btn-max">RICH</button>
      <button id="egt-slider-mid" class="egt-btn egt-btn-preset egt-btn-mid">PEAK</button>
      <button id="egt-slider-min" class="egt-btn egt-btn-preset egt-btn-min">LEAN</button>
    </div>
  </div>
  <!-- Fila inferior: Value -->
  <div class="egt-value-row">
    <div class="egt-value-label" id="egt-slider-value-label">45%</div>
  </div>

  <div class="egt-bug-row">
    <input type="range" min="800" max="1600" value="1450" id="egt-bug-slider" class="egt-bug-slider-input">
    <div class="egt-bug-value-label" id="egt-bug-value-label">1450</div>
  </div>

  <div class="egt-bug-actions-row">
    <button id="egt-bug-set-peak" class="egt-btn egt-btn-bug">SET PK</button>
    <button id="egt-bug-reset" class="egt-btn egt-btn-bug">RST 1450</button>
    <button id="egt-sim-toggle" class="egt-btn egt-btn-sim active" title="EGT Simulado activo">SIM</button>
  </div>
</div>
